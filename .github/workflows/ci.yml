name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint & format
        run: bun run check
      - name: Type check
        run: bun run type-check
      - name: Test
        run: bun run test
      - name: Live tests
        run: bun run test:live
